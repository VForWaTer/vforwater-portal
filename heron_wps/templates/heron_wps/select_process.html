{% load static %}


<script src="{% static 'vfwheron/js/jquery-3.2.1.min.js' %}"></script>


{% block javascript %}
{% endblock %}

<div class="respo-container respo-light-turquoise">
    <b title="Sammlung von Werkzeugen/Methoden zur Datenverarbeitung.">Werkzeugkiste </b>
</div>
<p>
<div class="respo-container respo-dropdown-hover">
    <div class="nav respo-dropdown-click"><b>Wählen Sie hier Ihr Werkzeug</b></div>
    <div class="respo-dropdown-content">
        {% for process in wps.processes %}
            <a class="respo-hover-blue nav" href="{% url 'wps:process' service=service identifier=process.identifier %}">{{ process.title }}</a>
        {% empty %}
            <option class="respo-hover-blue nav" value="Aggregate">Aggregate</option>
            <option class="respo-hover-blue nav" value="Interpolate">Interpolate</option>
            <option class="respo-hover-blue nav" value="Regression">Regression</option>
            <option class="respo-hover-blue nav" value="NA-Models">NA-Models</option>
        {% endfor %}
    </div>
</div>
</p>
