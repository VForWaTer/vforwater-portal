{% load static %}
<div id="map" class="map" onload="create_map()">  	
	<div class="respo-main respo-black respo-icon-bar" id="filterbox"> 
		  <a href="javascript:void(0)" id="draw_polygon" class="respo-hover-white respo-hide-small" title="Draw"><i class="fa fa-square-o fa-fw"></i></a>
		  <a href="javascript:void(0)" id="modify_polygon" class="respo-hover-white respo-hide-small" title="Edit"><i class="fa fa-edit fa-fw"></i></a>
		  <a href="javascript:void(0)" id="select_polygon" class="respo-hover-white respo-hide-small" title="Select Drawing"><i class="fa fa-hand-pointer-o fa-fw"></i></a>
		  <a href="javascript:void(0)" id="remove_polygon" class="respo-hover-white respo-hide-small" title="Remove"><i class="fa fa-trash fa-fw"></i></a>
		  <a href="javascript:void(0)" id="draw_close" class="respo-hover-white respo-hide-small" title="Exit Drawing"><i class="fa fa-remove fa-fw"></i></a>
	      <a href="javascript:void(0)" onclick="select_catchment_toggle()" class="respo-hover-white respo-hide-small" title="Select Catchment"><i class="fa fa-check-square-o fa-fw"></i></a>
		  <a href="javascript:void(0)" onclick="filterbox_close()" class="respo-hover-red respo-hide-small respo-right" title="Close Toolbar"><i class="fa fa-remove fa-fw"></i></a>	    
		  <select class="respo-select" id="select_catchment" autocomplete="off" onchange="select_catchment()">
		  	<option value="0" selected="selected">Select Catchment Area</option>
		  	<option value="Rainfall">Germany</option>
		  	<option value="River">Netherlands</option>
		  	<option value="Soil">Luxembourg</option>
		  </select>
	</div>
</div>

<!--  ol.css is OpenLayers which is to render geo data in a webbrowser -->
<link rel="stylesheet" type="text/css"
	href="{% static 'vfwheron/vcss/ol.css' %}">
<style>
.map {
	height: 86%;
	width: 100%;
}
</style>
<script src="{% static 'vfwheron/js/ol.js' %}" type="text/javascript"></script>
<script src="{% static 'vfwheron/js/map.js' %}" type="text/javascript"></script>
<body onload="create_map()">
	<!-- <body class="respo-light-grey" onload="create_map()">  -->
	<div id="map" class="map"></div>
</body>
