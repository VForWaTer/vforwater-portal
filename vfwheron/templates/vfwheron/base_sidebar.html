{% load static %}
{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}

<head>
  <script src="{% static 'vfwheron/js/sidebar.js' %}" type="text/javascript"></script>
  <style>
  .respo-sidenav {margin-top: 37px;}
  </style>
</head>

<body>
<!-- TODO: check if still in use. If not delete that parm -->
<param id="workdata" value ="{{ workspaceData }}"></param> <!-- param to bridge data from view to js  -->
<!--   Sidenav/menu -->
  <nav class="respo-sidenav respo-collapse respo-white respo-animate-left" style="z-index:3;width:300px;" id="mySidenav"><br>
    <div class="respo-container respo-row">
      <div class="respo-col s4">
        <img src="{% static 'vfwheron/images/logo_main.png' %}" style="width:200px"><br>
      </div>
    </div>
    <a href="#" class="respo-padding-8 respo-hide-large respo-dark-grey respo-hover-black" onclick="respo_close()" title="close menu"><i class="fa fa-remove fa-fw"></i>{%  trans "  Close Menu" %}</a>
    <hr style="margin-bottom:0px;">

  {% block data %}
    {% include 'vfwheron/select_data.html' %}
  {% endblock  %}

    <hr style="margin-bottom:0px;">

    <div class="respo-container respo-light-turquoise">
      <b title="Area to make the datasets you have selected available for further use.">{%  trans "Data store" %}</b>
    </div>
    <ul class="respo-ul respo-card-4 respo-white" id="workspace">
        <b class="respo-btn-group">
            <input class="respo-btn respo-blue respo-right" type="submit"
                onclick="remove_all_datasets()" value="Remove all datasets" data-toggle="tooltip"
                title="Remove all datasets from data store">
            </b>
    </ul>
  </nav>

  Overlay effect when opening sidenav on small screens
<div class="respo-overlay respo-hide-large respo-animate-opacity" onclick="respo_close()" style="cursor:pointer" title="close side menu" id="myOverlay"></div>
</body>
