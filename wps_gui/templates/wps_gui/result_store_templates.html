<div id="new_result_store" class="flex-1 min-h-0 mt-4 bg-gray-50 p-4 overflow-y-auto">
    <div class="flex items-center justify-between gap-6">

        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 items-center justify-center rounded-full bg-white">
            <i id="job_status_icon" class="fa-solid fa-circle-check text-emerald-600"></i>
          </div>
      
          <div class="flex flex-col">
            <span id="job_status_title" class="text-base font-bold text-emerald-700"></span>
            <span id="job_status_desc" class="text-xs text-gray-500"></span>
          </div>
        </div>
      
        <div
          class="px-5 py-3 text-right max-w-[60%]">
          <span class="block text-xs uppercase tracking-wide text-indigo-500">
            Job name
          </span>
          <span id="job_name" class="block text-lg font-semibold text-black leading-tight">
            
          </span>
        </div>
      
      </div>

    <section class="rounded-xl border border-gray-200 bg-gray-50/60 p-4">
        <dl class="grid grid-cols-2 gap-4 sm:grid-cols-4">
          <div class="rounded-lg bg-white p-3 ring-1 ring-gray-200">
            <dt class="text-xs font-medium text-gray-500">Job ID</dt>
            <dd id="job_id" class="mt-1 text-sm font-semibold text-gray-900"></dd>
          </div>
    
          <div class="rounded-lg bg-white p-3 ring-1 ring-gray-200">
            <dt class="text-xs font-medium text-gray-500">Created</dt>
            <dd id="job_start_time" class="mt-1 text-sm font-semibold text-gray-900"></dd>
          </div>
    
          <div class="rounded-lg bg-white p-3 ring-1 ring-gray-200">
            <dt class="text-xs font-medium text-gray-500">Completed</dt>
            <dd id="job_end_time" class="mt-1 text-sm font-semibold text-gray-900"></dd>
          </div>
    
          <div class="rounded-lg bg-white p-3 ring-1 ring-gray-200">
            <dt class="text-xs font-medium text-gray-500">Duration</dt>
            <dd id="job_duration" class="mt-1 text-sm font-semibold text-gray-900"></dd>
          </div>
        </dl>
    </section>

    <section id="download_section" class="rounded-xl border border-gray-200 bg-white p-4 mt-4">
        <div id="failure_box" class="text-xs font-bold"> 
          
        </div>
        <div id="success_box" class="grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-4">
          <!-- Button card -->
          <a id="download_result"
             href="#"
             class="group flex items-center gap-3 rounded-lg border border-gray-200 bg-gray-50 px-3 py-3 hover:bg-gray-100 hover:border-gray-300 transition">
            <span class="flex h-9 w-9 items-center justify-center rounded-md bg-indigo-50 ring-1 ring-indigo-100">
              <i class="fa-solid fa-table text-indigo-600"></i>
            </span>
            <span class="flex flex-col">
              <span class="text-sm font-semibold text-gray-900 group-hover:text-gray-950">Download</span>
              <span class="text-xs text-gray-500">Choose individual</span>
            </span>
          </a>
    
          <a id="download_zip_result"
             href="#"
             class="group flex items-center gap-3 rounded-lg border border-gray-200 bg-gray-50 px-3 py-3 hover:bg-gray-100 hover:border-gray-300 transition">
            <span class="flex h-9 w-9 items-center justify-center rounded-md bg-indigo-50 ring-1 ring-indigo-100">
              <i class="fa-solid fa-file-zipper text-indigo-600"></i>
            </span>
            <span class="flex flex-col">
              <span class="text-sm font-semibold text-gray-900">Download Zip</span>
              <span class="text-xs text-gray-500">All artifacts</span>
            </span>
          </a>
    
          <a id="show_as_table_result"
             href="#"
             class="group flex items-center gap-3 rounded-lg border border-gray-200 bg-gray-50 px-3 py-3 hover:bg-gray-100 hover:border-gray-300 transition">
            <span class="flex h-9 w-9 items-center justify-center rounded-md bg-indigo-50 ring-1 ring-indigo-100">
              <i class="fa-solid fa-table text-indigo-600"></i>
            </span>
            <span class="flex flex-col">
              <span class="text-sm font-semibold text-gray-900">Show as Table</span>
              <span class="text-xs text-gray-500">Inline view</span>
            </span>
          </a>
    
          <a id="preview_result"
             href="#"
             class="group flex items-center gap-3 rounded-lg border border-gray-200 bg-gray-50 px-3 py-3 hover:bg-gray-100 hover:border-gray-300 transition">
            <span class="flex h-9 w-9 items-center justify-center rounded-md bg-indigo-50 ring-1 ring-indigo-100">
              <i class="fa-solid fa-magnifying-glass text-indigo-600"></i>
            </span>
            <span class="flex flex-col">
              <span class="text-sm font-semibold text-gray-900">Preview Results</span>
              <span class="text-xs text-gray-500">Quick look</span>
            </span>
          </a>
        </div>
      </section>

      <section id="remove_section" class="py-4 mt-4">
        <div class="flex flex-col gap-4 sm:flex-row sm:items-center">
      
          <div class="flex flex-col gap-3 sm:flex-row">
      
            <a href="#"
               class="inline-flex items-center justify-center gap-2
                      rounded-lg
                      !bg-red-400 !text-white
                      px-4 py-2 text-sm font-semibold
                      ring-1 ring-red-300
                      hover:!bg-red-500
                      active:!bg-red-600
                      transition">
              <i class="fa-solid fa-eraser"></i>
              Remove from View
            </a>
      
            <a href="#"
               class="inline-flex items-center justify-center gap-2
                      rounded-lg
                      !bg-red-500 !text-white
                      px-4 py-2 text-sm font-semibold
                      shadow-sm
                      hover:!bg-red-600
                      active:!bg-red-700
                      focus:outline-none focus:ring-2 focus:ring-red-500 focus:ring-offset-1
                      transition">
              <i class="fa-solid fa-trash"></i>
              Remove from DB
            </a>
      
          </div>
      
          <div class="flex flex-col gap-3 sm:flex-row sm:ml-auto">
      
            <a href="#"
               class="inline-flex items-center justify-center gap-2
                      rounded-lg
                      !bg-gray-100 text-gray-800
                      px-4 py-2 text-sm font-semibold
                      ring-1 ring-gray-200
                      hover:bg-gray-200
                      transition">
              <i class="fa-solid fa-rotate"></i>
              Refresh Manually
            </a>
      
            <a href="#"
               class="inline-flex items-center justify-center gap-2
                      rounded-lg
                      !bg-indigo-100 text-indigo-800
                      px-4 py-2 text-sm font-semibold
                      ring-1 ring-indigo-200
                      hover:bg-indigo-200
                      transition">
              <i class="fa-solid fa-arrow-up-right-from-square"></i>
              Reopen Tool
            </a>
      
          </div>
      
        </div>
      </section>      
</div>
