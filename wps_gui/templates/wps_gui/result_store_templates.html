<div id="new_result_store" class="flex-1 min-h-0 flex flex-col justify-between py-2">

    <!-- Status Bar -->
    <div id="job_status_bar" class="flex items-center gap-3 px-4 py-3 bg-gray-100 rounded-lg">
        <i id="job_status_icon" class="fa-solid fa-circle-check text-sm"></i>
        <div>
            <span id="job_status_title" class="block text-sm font-bold uppercase tracking-widest leading-tight"></span>
            <!--<span id="job_status_desc" class="block text-[10px] leading-tight opacity-80"></span> -->
        </div>
    </div>

    <!-- Metadata -->
    <div class="flex flex-col gap-4">

        <!-- Row 1: Job Name + Job ID -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-50 px-3 py-2">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-600 mb-1">Job Name</label>
                <p id="job_name" class="font-bold text-primary truncate"></p>
            </div>
            <div class="bg-gray-50 px-3 py-2">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-600 mb-1">Job ID</label>
                <p id="job_id" class="text-sm font-medium text-gray-700 font-mono truncate"></p>
            </div>
        </div>

        <!-- Row 2: Created + Completed + Duration -->
        <div class="grid grid-cols-3 gap-4">
            <div class="bg-gray-50 px-3 py-2">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-600 mb-1">Created</label>
                <p id="job_start_time" class="text-sm font-bold text-black"></p>
            </div>
            <div class="bg-gray-50 px-3 py-2">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-600 mb-1">Completed</label>
                <p id="job_end_time" class="text-sm font-bold text-black"></p>
            </div>
            <div class="bg-gray-50 px-3 py-2">
                <label class="block text-[10px] font-bold uppercase tracking-widest text-gray-600 mb-1">Duration</label>
                <p id="job_duration" class="text-sm font-bold text-black"></p>
            </div>
        </div>

    </div>

    <!-- Action Buttons -->
    <section id="download_section">
        <div id="failure_box" class="hidden text-xs font-semibold text-red-700 bg-red-100 px-3 py-2 mb-4"></div>
        <div id="success_box" class="grid grid-cols-2 gap-2">
            <a id="download_result" href="#"
               class="flex items-center justify-center gap-2 w-full py-2.5 text-xs font-semibold !text-white !bg-blue-600 hover:!bg-indigo-700 transition-colors">
                <i class="fa-solid fa-download"></i> Download
            </a>
            <a id="download_zip_result" href="#"
               class="flex items-center justify-center gap-2 w-full py-2.5 text-xs font-semibold !text-black !bg-gray-300 hover:!bg-gray-400 transition-colors">
                <i class="fa-solid fa-file-zipper"></i> Download Zip
            </a>
            <a id="show_as_table_result" href="#"
               class="flex items-center justify-center gap-2 w-full py-2.5 text-xs font-semibold !text-black !bg-gray-300 hover:!bg-gray-400 transition-colors">
                <i class="fa-solid fa-table"></i> Show as Table
            </a>
            <a id="preview_result" href="#"
               class="flex items-center justify-center gap-2 w-full py-2.5 text-xs font-semibold !text-white !bg-blue-600 hover:!bg-indigo-700 transition-colors">
                <i class="fa-solid fa-magnifying-glass"></i> Preview
            </a>
        </div>
    </section>

    <!-- Footer Actions -->
    <section id="remove_section" class="flex flex-col gap-2 pt-3 border-t border-gray-200">
        <div class="flex justify-between gap-3">
          <div class=" flex items-center gap-3">
            <a href="#" class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-red-600 transition-colors">
                <i class="fa-solid fa-eraser"></i> Remove from View
            </a>
            <a id="remove_from_db" href="#" class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-red-600 transition-colors">
                <i class="fa-solid fa-trash"></i> Remove from DB
            </a>
          </div>
          <div class="flex items-center gap-3">
            <a href="#" class="flex items-center gap-1.5 text-xs text-gray-400 hover:text-gray-700 transition-colors">
                <i class="fa-solid fa-rotate"></i> Refresh
            </a>
            <a href="#" class="flex items-center gap-1.5 text-xs text-indigo-500 hover:text-indigo-700 transition-colors">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Reopen Tool
            </a>
          </div>
        </div>
    </section>

</div>
