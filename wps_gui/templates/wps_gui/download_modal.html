<!-- Modal Overlay -->
<div id="fileListModal"
     class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">

  <!-- Modal Card -->
  <div class="bg-white w-full max-w-3xl rounded shadow-2xl overflow-hidden">

    <!-- Header -->
    <div class="bg-blue-600 px-8 py-5 flex justify-between items-center">
      <h2 class="text-2xl font-semibold text-white flex items-center gap-3">
        <i class="fa-solid fa-folder-open"></i>
        Download Files
      </h2>

      <button
          onclick="closeDownloadModal()"
          class="flex items-center justify-center w-9 h-9 rounded-full bg-white/20 hover:bg-white/30 transition"
      >
          <i class="fa-solid fa-xmark text-white text-lg"></i>
      </button>
    </div>

    <!-- File List -->
    <div class="p-8 max-h-[500px] overflow-y-auto">
      <ul id="fileList" class="space-y-4">

      </ul>
    </div>

  </div>
</div>

<script>
  function closeDownloadModal() {
    document.getElementById('fileListModal').classList.add('hidden');
    document.getElementById('fileList').innerHTML = '';
  }
</script>
