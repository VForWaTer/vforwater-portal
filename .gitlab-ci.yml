# Uses shell executor on portal.vforwater.de

# Pipeline
stages:
    - test
    - deploy

# Test vforwater-portal
vforwater-portal-test:
    stage: test
    before_script:
        # For debugging
        - pwd
        - export
    script:
        # TODO Run test script...
        - echo "Testing..."

# Deploy vforwater-portal
vforwater-portal-deploy:
    stage: deploy
    script:
        # Stop web server
        - sudo systemctl stop vfwportal
        # Move current installation to "vforwater-portal_old"
        - sudo -u vfwportal rm -rf /home/vfwportal/vforwater-portal_old
        - test ! -d /home/vfwportal/vforwater-portal ||
            sudo -u vfwportal mv /home/vfwportal/vforwater-portal
               /home/vfwportal/vforwater-portal_old
        # Copy new files and prepared "settings.py"
        - sudo cp -r ${CI_PROJECT_DIR} /home/vfwportal/vforwater-portal
        - sudo chown -R vfwportal:vfwportal /home/vfwportal/vforwater-portal
        - sudo -u vfwportal cp /home/vfwportal/settings.py-prod
             /home/vfwportal/vforwater-portal/heron/settings.py
        - sudo -u vfwportal cd /home/vfwportal/vforwater-portal
        #- python36 manage.py migrate
        - sudo -u vfwportal python36 manage.py collectstatic --noinput
        # fix ownership
        #- cd /home/vfwportal
        #- sudo chown -R vfwportal:vfwportal vforwater-portal
        # Start web server
        - sudo systemctl start vfwportal
    environment:
        name: production
        url: https://portal.vforwater.de/vfwheron/
    only:
        - master
