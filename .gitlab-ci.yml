# Pipeline
stages:
    - build
    - push
    - test
    - tag_for_deploy


# building docker image
vfwportal-demo-build:
    stage: build
    script:
        # build docker container using buildah
        - /usr/bin/buildah build-using-dockerfile -f Dockerfile -t vfwportal:$CI_COMMIT_SHA
    only:
        - demo


vfwportal-demo-test:
    stage: test
    script:
        # call unit tests
        # - /usr/bin/podman run -v /etc/vforwater/vfwportal-demo/settings.py:/home/vfwportal/vforwater-portal/heron/settings.py:ro -v /etc/vforwater/vfwportal-demo/test_settings.py:/home/vfwportal/vforwater-portal/heron/test_settings.py:ro localhost:5000/demo/vfwportal:$CI_COMMIT_SHA /bin/bash -c "export DJANGO_SETTINGS_MODULE=heron.test_settings && /usr/local/bin/pytest -v -s"
        - /usr/bin/podman run -v /etc/vforwater/vfwportal-demo-test/settings.py:/home/vfwportal/vforwater-portal/heron/settings.py:ro -v /etc/vforwater/vfwportal-demo-test/test_settings.py:/home/vfwportal/vforwater-portal/heron/test_settings.py:ro localhost:5000/demo/vfwportal:$CI_COMMIT_SHA /bin/bash -c "export DJANGO_SETTINGS_MODULE=heron.test_settings && /usr/local/bin/pytest -v -s"

    only:
        - demo


vforwater-demo-tag_for_deploy:
    stage: tag_for_deploy
    script:
        - echo "pushing vfwportal:latest"
        - /usr/bin/buildah push --tls-verify=false vfwportal:$CI_COMMIT_SHA docker://localhost:5000/demo/vfwportal
    only:
        - demo

# pushing docker image to some registry
vfwportal-demo-push:
    stage: push
    script:
        - echo "pushing vfwportal:$CI_COMMIT_SHA"
        - /usr/bin/buildah push --tls-verify=false vfwportal:$CI_COMMIT_SHA docker://localhost:5000/demo/vfwportal:$CI_COMMIT_SHA
        
    only:
        - demo

# building docker image
vfwportal-prod-build:
    stage: build
    script:
        # build docker container using buildah
        - /usr/bin/buildah build-using-dockerfile -f Dockerfile -t vfwportal:$CI_COMMIT_SHA
    only:
        - production

# pushing docker image to some registry
vfwportal-prod-push:
    stage: push
    script:
        - echo "pushing vfwportal:$CI_COMMIT_SHA"
        - /usr/bin/buildah push --tls-verify=false vfwportal:$CI_COMMIT_SHA docker://localhost:5000/prod/vfwportal:$CI_COMMIT_SHA
        - echo "pushing vfwportal:latest"
        - /usr/bin/buildah push --tls-verify=false vfwportal:$CI_COMMIT_SHA docker://localhost:5000/prod/vfwportal
    only:
        - production
