<!DOCTYPE html>
<html>
<head>
    <title>OSM Demo</title>
    <link rel="stylesheet" href="v4.0.1-dist/ol.css" type="text/css">
    <script src="v4.0.1-dist/ol.js"></script>
</head>
<body>
    <div id="map"></div>
    <script>
    var map = new ol.Map({
      layers: [
        new ol.layer.Tile({
          source: new ol.source.OSM({
            url: window.location.origin + '/osm/{z}/{x}/{y}.png'
          })
        })
      ],
      target: 'map',
      controls: ol.control.defaults({
        attributionOptions: /** @type {olx.control.AttributionOptions} */ ({
          collapsible: false
        })
      }),
      view: new ol.View({
        center: ol.proj.fromLonLat([8.4325, 49.0957]),
        zoom: 15,
        minZoom: 2,
        maxZoom: 20
      })
    });
    </script>
</body>
</html>
