<!DOCTYPE html>
<html>
<head>
    <!-- Based on http://openlayers.org/en/latest/examples/full-screen.html -->
    <title>OpenStreetMap Demo</title>
    <link rel="stylesheet" href="v4.1.1-dist/ol.css" type="text/css">
    <script src="v4.1.1-dist/ol.js"></script>
    <style>
      /* Make the OpenLayers map fill the page. */
      html, body, .map {
        margin: 0;
        height: 100%;
      }
    </style>
</head>
<body>
    <div id="map" class="map"></div>
    <script>
    var map = new ol.Map({
      layers: [
        new ol.layer.Tile({
          source: new ol.source.OSM({
            url: window.location.origin + '/osm/{z}/{x}/{y}.png'
          })
        })
      ],
      controls: ol.control.defaults(),
      target: 'map', // target div id
      view: new ol.View({
        center: ol.proj.fromLonLat([8.4325, 49.0957]),
        zoom: 14,
        minZoom: 2,
        maxZoom: 18
      })
    });
    </script>
</body>
</html>
