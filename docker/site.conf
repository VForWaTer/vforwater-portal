<VirtualHost *:80>
    #ServerName www.example.com
    #ServerAdmin webmaster@localhost
    
    DocumentRoot /var/www/html

    # Provide a little openlayers demo page at /map.
    Alias /map /var/www/map/
    
    # Proxy for tilemill
    #ProxyPreserveHost On
    #RewriteEngine On
    
    #RewriteCond %{REQUEST_URI} ^(/tm_tiles.*)$
    #RewriteRule ^/tm_tiles(.*) http://localhost:20008$1 [L,P]
    #ProxyPass        /tm_tiles http://localhost:20008
    #ProxyPassReverse /tm_tiles http://localhost:20008

    #RewriteCond %{REQUEST_URI} ^(/tilemill.*)$
    #RewriteRule ^/tilemill(.*) http://localhost:20009$1 [L,P]
    #ProxyPass        /tilemill http://localhost:20009
    #ProxyPassReverse /tilemill http://localhost:20009

    #LogLevel info ssl:warn

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    # mod_tile configuration for renderd.
    Include conf-available/mod_tile.conf

    # wsgi configuration for django application.
    Include conf-available/wsgi.conf
</VirtualHost>
