<IfModule mod_ssl.c>
	<VirtualHost *:443>
		#ServerAdmin webmaster@localhost

		DocumentRoot /var/www/html

		ErrorLog ${APACHE_LOG_DIR}/error.log
		CustomLog ${APACHE_LOG_DIR}/access.log combined

		#   SSL Engine Switch:
		#   Enable/Disable SSL for this virtual host.
		SSLEngine on

		#   A self-signed (snakeoil) certificate can be created by installing
		#   the ssl-cert package. See
		#   /usr/share/doc/apache2/README.Debian.gz for more info.
		#   If both key and certificate are stored in the same file, only the
		#   SSLCertificateFile directive is needed.
		SSLCertificateFile	/etc/ssl/certs/ssl-cert-snakeoil.pem
		SSLCertificateKeyFile /etc/ssl/private/ssl-cert-snakeoil.key
		
		# Provide a little openlayers demo page at /map.
        Alias /map /var/www/map/

        # mod_tile configuration for renderd.
        Include conf-available/mod_tile.conf

        # wsgi configuration for django application.
        <IfModule wsgi_module>
            # Already in HTTP configuration
            #WSGIDaemonProcess vforwater python-path=/var/www/vfw
            WSGIProcessGroup vforwater

            WSGIScriptAlias /vfw /var/www/vfw/heron/wsgi.py
            
            # Static files
            Alias /static/vfwheron/  /var/www/vfw/vfwheron/static/vfwheron/
            Alias /static/dashboard/ /var/www/vfw/dashboard/static/dashboard/
            Alias /static/admin/     /usr/local/lib/python3.5/dist-packages/django/contrib/admin/static/admin/
            <Directory /usr/local/lib/python3.5/dist-packages/django/contrib/admin/static/admin>
                Require all granted
            </Directory>
        </IfModule>
	</VirtualHost>
</IfModule>
